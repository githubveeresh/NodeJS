jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # This sets the folder for ALL steps in this job
    defaults:
      run:
        working-directory: ./your-subfolder-name 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
