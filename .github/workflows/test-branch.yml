defaults:
  run:
    working-directory: ./myapp


on:
  # Triggers the workflow on push or pull request events but only for the "test" branch
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # This sets the folder for ALL steps in this job
    defaults:
      run:
        working-directory: ./your-subfolder-name 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
